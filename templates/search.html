<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ query_string }} | Stultus</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/search-results.css">
</head>
    <body>
        <div id="search-header">
            <form action="#">
                <h1 id="main-title">Stultus</h1>
                <input id="search-input" type="search" placeholder=" Search..." value="{{ query_string }}">
                <input id="submit-btn" type="submit" value="🔍">
            </form>
        </div>
        <div id="results-container">
            {% for url, score, relevance, ref_score, reference_count in search_results %}
                <div class="result">
                    <div id="text-buffer" style="margin:15px">
                        <a href="{{ url }}">{{ url }}</a>
                        <p>Search Score: {{ score }}</p>
                        <p>Relevance: {{ relevance }}</p>
                        <p>Ref Score: {{ ref_score }}</p>
                        <p>Reference Ct:{{ reference_count }}</p>
                    </div>
                </div>
            {% endfor %}
        </div>
    </body>
    <footer id="motto-footer">Website made by hand with love. ♡</footer>
</html>
